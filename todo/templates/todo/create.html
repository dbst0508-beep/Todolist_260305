{% extends "base.html" %}
{% load static %}
{% block content %}
<div class="container">
  <h2>Create a New Todo</h2>
  <div>
      <label for="image">Image:</label>
      <input type="file" id="image">
    </div>

  </div>
    <div>
      <label for="name">Name:</label>
      <input type="text" name="name" id="name">
    </div>

    <div>
      <label for="description">Description:</label>
      <textarea name="description" id="description">
      </textarea>
    </div>

    <div>
      <label for="complete">Complete:</label>
      <input type="checkbox" name="complete" id="complete">
    </div>

    <div>
      <label for="exp">Experience Points:</label>
      <input type="number" name="exp" id="exp" min="0">
    </div>

    <button type="submit" id="todoCreate">Create</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script>
const api = axios.create({ baseURL: "/" });
// Content-Type 지정 안 함 → FormData 쓸 때 axios가 자동으로 multipart 설정

api.interceptors.request.use(config => {
  const csrfToken = document.cookie
    .split("; ")
    .find(row => row.startsWith("csrftoken"))
    ?.split("=")[1];
  if (csrfToken) config.headers["X-CSRFToken"] = csrfToken;
  return config;
});

document.getElementById("todoCreate").addEventListener("click", async () => {
  try {
    const formData = new FormData();  // ← JSON 대신 FormData 사용
    formData.append("name", document.getElementById("name").value);
    formData.append("description", document.getElementById("description").value);
    formData.append("complete", document.getElementById("complete").checked);
    formData.append("exp", Number(document.getElementById("exp").value || 0));

    const imageFile = document.getElementById("image").files[0];
    if (imageFile) formData.append("image", imageFile);  // ← 이미지 추가

    const res = await api.post("todo/viewsets/view/", formData);
    console.log(res.data);
    window.location.href = "/todo/list/";
  } catch (err) {
    console.error(err.response?.data || err.message);
  }
});
</script>
{% endblock %}
